# Pre-provisioned PV for kind / minikube single-node clusters. The
# overlay pins the PVC to this PV via storageClassName=manual + a
# selector. Adjust the host path if your kind/minikube uses a
# different mount.
apiVersion: v1
kind: PersistentVolume
metadata:
  name: agent-telemetry-data-local
  labels:
    app.kubernetes.io/name: agent-telemetry
    overlay: local
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  storageClassName: manual
  persistentVolumeReclaimPolicy: Retain
  hostPath:
    path: /tmp/agent-telemetry-data
    type: DirectoryOrCreate
