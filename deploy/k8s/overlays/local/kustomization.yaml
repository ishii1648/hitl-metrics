apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Local overlay for kind / minikube. Uses NodePort to skip Ingress and
# pins the PVC to a hostPath PV so a single-node cluster works without
# a CSI driver. This is for `kubectl apply -k` smoke-testing the same
# manifests that production runs — not for shared environments.
namespace: agent-telemetry

resources:
  - ../../base
  - hostpath-pv.yaml

patches:
  - path: server-service-nodeport.yaml
    target:
      kind: Service
      name: agent-telemetry-server
  - path: grafana-service-nodeport.yaml
    target:
      kind: Service
      name: agent-telemetry-grafana
  - path: pvc-hostpath.yaml
    target:
      kind: PersistentVolumeClaim
      name: agent-telemetry-data

# Sample-only token. Replace via `kubectl edit secret` or a
# sealed-secret operator before exposing the cluster.
secretGenerator:
  - name: agent-telemetry-server-token
    behavior: replace
    literals:
      - token=local-dev-token
