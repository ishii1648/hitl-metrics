apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-telemetry-grafana
  labels:
    app.kubernetes.io/name: agent-telemetry-grafana
spec:
  # Single replica: Grafana stores its own state (users, dashboards
  # last-viewed, etc.) on the same PVC subPath; multi-replica would
  # corrupt grafana.db. Use Recreate so the SQLite-mounting pod isn't
  # held by a hanging predecessor during rollouts.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-telemetry-grafana
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-telemetry-grafana
    spec:
      securityContext:
        runAsUser: 472
        runAsGroup: 472
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana-oss:11.5.2
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_INSTALL_PLUGINS
              value: frser-sqlite-datasource
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: Viewer
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            # Reuse the same datasource yaml the local docker-compose
            # uses; both point at /var/lib/grafana/agent-telemetry.db so
            # the dashboard JSON works unchanged in either environment.
            - name: provisioning-datasources
              mountPath: /etc/grafana/provisioning/datasources/agent-telemetry.yaml
              subPath: agent-telemetry.yaml
            - name: provisioning-dashboards
              mountPath: /etc/grafana/provisioning/dashboards/agent-telemetry.yaml
              subPath: agent-telemetry.yaml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            # Mount only the SQLite file (subPath) — Grafana's own
            # /var/lib/grafana state must stay on the container fs.
            - name: telemetry-data
              mountPath: /var/lib/grafana/agent-telemetry.db
              subPath: agent-telemetry.db
      volumes:
        - name: provisioning-datasources
          configMap:
            name: agent-telemetry-grafana-datasources
        - name: provisioning-dashboards
          configMap:
            name: agent-telemetry-grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: agent-telemetry-grafana-dashboards
        - name: telemetry-data
          persistentVolumeClaim:
            claimName: agent-telemetry-data
