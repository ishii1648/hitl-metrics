apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Resources are namespaced via the overlay. The base does NOT set a
# namespace so overlays can pin the manifest into agent-telemetry,
# kube-system, or any per-environment namespace they like.
resources:
  - namespace.yaml
  - pvc.yaml
  - secret.yaml
  - server-deployment.yaml
  - server-service.yaml
  - grafana-deployment.yaml
  - grafana-service.yaml

# Provision Grafana via ConfigMaps generated from the canonical files
# in grafana/. The same files back local docker-compose, so dashboard /
# datasource changes flow into both environments without duplication.
configMapGenerator:
  - name: agent-telemetry-grafana-datasources
    files:
      - agent-telemetry.yaml=../../../grafana/provisioning/datasources/agent-telemetry-docker.yaml
  - name: agent-telemetry-grafana-dashboards-provider
    files:
      - agent-telemetry.yaml=../../../grafana/provisioning/dashboards/agent-telemetry-docker.yaml
  - name: agent-telemetry-grafana-dashboards
    files:
      - ../../../grafana/dashboards/agent-telemetry.json

# Generators above default to a content-hash name suffix; setting
# disableNameSuffixHash=false (the default) gives free dashboard
# rollout-on-change. Keep it that way; the Deployment references the
# generated names without a suffix and Kustomize patches them in.
