# Sample secret. Replace `token` with the real API key in your overlay
# (use `kubectl create secret generic ... --dry-run=client -o yaml` or a
# sealed-secret / external-secret operator). Clients place the same
# value under `[server] token` in ~/.claude/agent-telemetry.toml.
apiVersion: v1
kind: Secret
metadata:
  name: agent-telemetry-server-token
  labels:
    app.kubernetes.io/name: agent-telemetry-server
type: Opaque
stringData:
  token: "REPLACE_ME"
