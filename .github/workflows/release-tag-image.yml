name: Release tag image promotion

# Promote the main-built `:sha-<short>` image to semver tags
# (`:vX.Y.Z` / `:vX.Y` / `:vX` / `:latest`) when a GitHub Release is
# published. Re-tag only — does not re-build, so the released digest is
# byte-identical to the image that was verified on main. Provenance and
# SBOM attestations attach to the digest, so they survive the re-tag
# without needing to be regenerated.
#
# Source: docker-image.yml publishes `:sha-<short>` for every main push.
# Release publish (driven by goreleaser via release.yml on tag push)
# triggers this workflow, which moves semver tags onto that digest.
on:
  release:
    types: [published]

# packages:write — required to push tag manifests to ghcr.io.
# contents:read — required to checkout and verify the release tag is
#                 reachable from origin/main.
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agent-telemetry-server

jobs:
  promote:
    name: promote ${{ github.event.release.tag_name }}
    runs-on: ubuntu-latest
    # docker-image.yml の job timeout は 20 分。main merge 直後に release を
    # 切ると、release-tag-image.yml は docker-image.yml の build 完了を待つ
    # 必要があるため、source image polling (最大 25 分) + その他の step に
    # 余裕を持たせて 30 分にする。
    timeout-minutes: 30
    steps:
      # Actions are pinned to commit SHAs (with the corresponding tag in a
      # comment) — version tags are mutable. Same policy as docker-image.yml.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
        with:
          # Need full history so we can verify the release tag's commit is
          # reachable from origin/main (rejects releases cut from feature
          # branches or arbitrary SHAs).
          fetch-depth: 0

      # Resolve the release's tag commit and gate on main-reachability.
      # We trust the tag's commit, not `target_commitish` (which is a
      # branch hint and can be `main` even if the tag points elsewhere).
      - id: target
        name: Resolve release commit
        run: |
          set -euo pipefail
          tag="${{ github.event.release.tag_name }}"
          tag_sha=$(git rev-list -n 1 "refs/tags/$tag")
          if ! git merge-base --is-ancestor "$tag_sha" "origin/main"; then
            echo "::error::Release tag $tag ($tag_sha) is not reachable from origin/main; refusing to promote." >&2
            exit 1
          fi
          short_sha=$(git rev-parse --short=7 "$tag_sha")
          echo "tag_sha=$tag_sha"     >> "$GITHUB_OUTPUT"
          echo "short_sha=$short_sha" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Compute the destination tag set from the release ref.
      #   - :vX.Y.Z + :vX.Y + :vX  always
      #   - :latest only on stable releases (skip pre-release like vX.Y.Z-rc.1)
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !github.event.release.prerelease }}

      # Wait for the source image to exist in the registry, then capture its
      # digest. Polling is needed because release.yml (goreleaser) finishes in
      # seconds while docker-image.yml's multi-arch build for the same main
      # commit takes ~5–10 minutes — so a release cut right after merge will
      # arrive here before :sha-<short> has been pushed. We poll instead of
      # forcing humans to manually order the merge → release sequence.
      #
      # The cheap main-reachability gate above runs first, so feature-branch
      # releases never enter this loop. If polling times out we fail with a
      # clear error: either docker-image.yml failed for this commit, or its
      # paths filter skipped the build — both need human attention.
      - id: source
        name: Wait for source image
        run: |
          set -euo pipefail
          src="${REGISTRY}/${IMAGE_NAME}:sha-${SHORT_SHA}"
          deadline=$(( $(date +%s) + WAIT_TIMEOUT_SECONDS ))
          while :; do
            if digest_json=$(docker buildx imagetools inspect --format '{{ json .Manifest }}' "$src" 2>/dev/null); then
              digest=$(printf '%s' "$digest_json" | jq -r '.digest')
              echo "Source image found: $src @ $digest"
              echo "src=$src"       >> "$GITHUB_OUTPUT"
              echo "digest=$digest" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            now=$(date +%s)
            if [ "$now" -ge "$deadline" ]; then
              echo "::error::Source image $src not found within ${WAIT_TIMEOUT_SECONDS}s. Check docker-image.yml: did it succeed for this commit, or did its paths filter skip the build?" >&2
              exit 1
            fi
            remaining=$(( deadline - now ))
            echo "Source image $src not yet in registry; retrying in ${POLL_INTERVAL_SECONDS}s (${remaining}s remaining)."
            sleep "$POLL_INTERVAL_SECONDS"
          done
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}
          SHORT_SHA: ${{ steps.target.outputs.short_sha }}
          # 25-minute ceiling: docker-image.yml's job timeout is 20 min, plus
          # buffer for the release publish to land before this workflow starts.
          WAIT_TIMEOUT_SECONDS: "1500"
          POLL_INTERVAL_SECONDS: "30"

      # Re-tag the multi-arch manifest list onto each destination tag.
      # `imagetools create -t <new> <src>` copies the manifest list (not
      # the layers) so the resulting tags resolve to the same digest as
      # the source — provenance/SBOM attestations remain valid without
      # being re-generated.
      - name: Promote tags
        run: |
          set -euo pipefail
          src="${SOURCE_REF}"
          src_digest="${SOURCE_DIGEST}"
          tag_args=()
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            tag_args+=("-t" "$tag")
          done <<< "${TAGS}"
          docker buildx imagetools create "${tag_args[@]}" "$src"
          # Verify each promoted tag now resolves to the source digest.
          while IFS= read -r tag; do
            [ -n "$tag" ] || continue
            promoted_digest=$(docker buildx imagetools inspect --format '{{ json .Manifest }}' "$tag" | jq -r '.digest')
            if [ "$promoted_digest" != "$src_digest" ]; then
              echo "::error::Digest mismatch on $tag: got $promoted_digest, expected $src_digest" >&2
              exit 1
            fi
            echo "promoted: $tag -> $promoted_digest"
          done <<< "${TAGS}"
        env:
          SOURCE_REF: ${{ steps.source.outputs.src }}
          SOURCE_DIGEST: ${{ steps.source.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
