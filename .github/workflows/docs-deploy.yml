name: Deploy docs site

on:
  push:
    branches:
      - main
    paths:
      - "site/**"
      - "aqua.yaml"
      - ".github/workflows/docs-deploy.yml"
  pull_request:
    paths:
      - "site/**"
      - "aqua.yaml"
      - ".github/workflows/docs-deploy.yml"
  workflow_dispatch:

permissions:
  contents: write

# 同時に複数の deploy が走らないようにする（gh-pages へのレース回避）
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # aqua.yaml で hugo (extended) と go のバージョンを単一の真実として管理する
      - uses: aquaproj/aqua-installer@v3.1.1
        with:
          aqua_version: v2.58.1

      - name: Resolve Hugo modules
        run: hugo mod get -u ./...

      # PR では deploy せず build 検証のみ（baseURL は hugo.toml の値で OK）
      - name: Build site
        run: hugo --gc --minify

      - uses: actions/upload-artifact@v4
        with:
          name: site-public
          path: site/public
          retention-days: 7

  deploy:
    # main への push のみ gh-pages にデプロイする
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-public
          path: public

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # gh-pages ブランチが存在しない初回も自動作成される
          force_orphan: true
          user_name: github-actions[bot]
          user_email: github-actions[bot]@users.noreply.github.com
          commit_message: "docs: deploy ${{ github.sha }}"
