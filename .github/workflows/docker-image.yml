name: Docker image

# PRs build the image to verify Dockerfile + multi-arch builds still work,
# but do NOT push to ghcr.io. Only main pushes (`:latest`, `:sha-<short>`)
# actually publish to the registry. This keeps the CI loop honest without
# granting fork PRs write access to the org's package namespace.
#
# Semver tag publish (`:vX.Y.Z` / `:vX.Y` / `:vX` / `:latest`) is handled
# by release-tag-image.yml, which re-tags the main-built image when a
# GitHub Release is published — so released digests are byte-identical to
# what was verified on main.
on:
  pull_request:
    paths:
      - "Dockerfile.server"
      - "cmd/agent-telemetry-server/**"
      - "internal/serverpipe/**"
      - "internal/syncdb/schema/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/docker-image.yml"
  push:
    branches: [main]
    paths:
      - "Dockerfile.server"
      - "cmd/agent-telemetry-server/**"
      - "internal/serverpipe/**"
      - "internal/syncdb/schema/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:

# packages:write — required to push to ghcr.io.
# id-token:write + attestations:write — required for actions/attest-build-provenance.
#
# These are only *exercised* on push events; the login / push / attest steps
# are gated by `if: github.event_name != 'pull_request'`. On PRs from forks,
# GitHub automatically downgrades GITHUB_TOKEN to read-only regardless of
# what we declare here, so a malicious fork can't reach ghcr.io even if the
# conditional steps were bypassed. (GitHub Actions does not support
# expressions inside `permissions:`, so we can't make the grant itself
# conditional.)
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agent-telemetry-server

jobs:
  build:
    name: build (${{ github.event_name == 'pull_request' && 'verify' || 'publish' }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      # Actions are pinned to commit SHAs (with the corresponding tag in a
      # comment) — version tags are mutable, and a compromised maintainer
      # account could move v3 → malicious commit. Dependabot can still bump
      # these when it sees the version comment.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a  # v4.0.0
        with:
          # arm64 emulation only — amd64 is the host arch on ubuntu-latest.
          platforms: arm64

      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0

      # Login is skipped on PRs — we don't push, so the registry credential
      # isn't needed and skipping it lets fork PRs run without secrets.
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy:
      #   - PR / non-default branch → no tags pushed (build verify only)
      #   - main branch push        → :latest, :sha-<short>
      # Semver tags (:vX.Y.Z etc.) are produced by release-tag-image.yml
      # via re-tagging on GitHub Release publish, not by this workflow.
      - id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf  # v6.0.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,enable={{is_default_branch}}
          labels: |
            org.opencontainers.image.title=agent-telemetry-server
            org.opencontainers.image.description=Dumb ingest layer that receives aggregated agent-telemetry rows and upserts them into SQLite.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - id: build
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f  # v7.1.0
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64,linux/arm64
          # PRs build but don't push; main/tag pushes actually publish.
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub-hosted layer cache. Survives runner restarts and avoids
          # re-downloading the ~80 MB Go module graph on every build.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: ${{ github.event_name != 'pull_request' }}
          sbom: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      # Anchor the SBOM / provenance to the pushed image digest. Surfaces in
      # the GitHub UI under the package's "Build provenance" tab and lets
      # consumers verify with `gh attestation verify` or `cosign verify-attestation`.
      # Skipped on PRs — there's no pushed digest to attest.
      - if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2.4.0
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
