name: Docker image

on:
  push:
    branches: [main]
    paths:
      - "Dockerfile.server"
      - "cmd/agent-telemetry-server/**"
      - "internal/serverpipe/**"
      - "internal/syncdb/schema/**"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/docker-image.yml"
    tags: ["v*"]
  workflow_dispatch:

# packages:write — required to push to ghcr.io.
# id-token:write + attestations:write — required for actions/attest-build-provenance.
permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/agent-telemetry-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
        with:
          # arm64 emulation only — amd64 is the host arch on ubuntu-latest.
          platforms: arm64

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag strategy:
      #   - main branch push   → :latest, :sha-<short>
      #   - tag push (vX.Y.Z) → :vX.Y.Z, :vX.Y, :vX, :latest
      # docker/metadata-action handles all of the above declaratively.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=short,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
          labels: |
            org.opencontainers.image.title=agent-telemetry-server
            org.opencontainers.image.description=Dumb ingest layer that receives aggregated agent-telemetry rows and upserts them into SQLite.
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.licenses=MIT

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub-hosted layer cache. Survives runner restarts and avoids
          # re-downloading the ~80 MB Go module graph on every build.
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}

      # Anchor the SBOM / provenance to the pushed image digest. Surfaces in
      # the GitHub UI under the package's "Build provenance" tab and lets
      # consumers verify with `gh attestation verify` or `cosign verify-attestation`.
      - uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
