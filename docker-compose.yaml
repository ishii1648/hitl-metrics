services:
  grafana:
    image: grafana/grafana-oss:11.5.2
    ports:
      - "${GRAFANA_PORT:-13000}:3000"
    environment:
      - GF_INSTALL_PLUGINS=frser-sqlite-datasource
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
    volumes:
      - ./grafana/provisioning/datasources/agent-telemetry-docker.yaml:/etc/grafana/provisioning/datasources/agent-telemetry.yaml
      - ./grafana/provisioning/dashboards/agent-telemetry-docker.yaml:/etc/grafana/provisioning/dashboards/agent-telemetry.yaml
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ${AGENT_TELEMETRY_DB:-./e2e/testdata/agent-telemetry.db}:/var/lib/grafana/agent-telemetry.db
    depends_on:
      - renderer
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 5s
      retries: 10

  renderer:
    image: grafana/grafana-image-renderer:3.11.6
    expose:
      - "8081"
