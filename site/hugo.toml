baseURL = "https://ishii1648.github.io/agent-telemetry/"
title = "agent-telemetry"
defaultContentLanguage = "ja"

# 末尾スラッシュ付きの URL に揃える（gh-pages 配下で扱いやすい）
canonifyURLs = true

# `{{< mermaid >}}` shortcode と raw HTML 経由の図解を許可
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

# Hextra theme — top nav + left sidebar + 右 TOC + dark mode の docs レイアウト
[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

# 上部ナビゲーションメニュー
[[menu.main]]
  name = "Docs"
  pageRef = "/explain"
  weight = 1

[[menu.main]]
  name = "GitHub"
  url = "https://github.com/ishii1648/agent-telemetry"
  weight = 2
  [menu.main.params]
    icon = "github"

[params]
  # 上部ナビバー
  [params.navbar]
    displayTitle = true
    displayLogo = false

  # ダーク / ライトモード切り替え（system 追従）
  [params.theme]
    default = "system"
    displayToggle = true

  # フッター
  [params.footer]
    enable = true
    displayCopyright = true
    displayPoweredBy = true

  # 各ページ "Edit this page" リンク
  [params.editURL]
    enable = true
    base = "https://github.com/ishii1648/agent-telemetry/edit/main/site/content"

  # 各セクションのページに次/前ナビ
  [params.page]
    width = "wide"
